name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    # 只有当 commit 信息包含 "Version Packages" 或者由你本地 changeset version 产生变动时运行
    # 或者简单点：每次 push 检查，由 changesets 插件内部判断是否需要 publish
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Publish to Stores
        id: changesets
        uses: changesets/action@v1
        with:
          # 【关键】因为你在本地已经跑过 version 了，这里不需要 version 参数
          # 插件会自动检测：如果没有 .changeset 目录且版本号升了，就会运行 publish
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIREFOX_EXTENSION_ID: ${{ secrets.AMO_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.AMO_SIGNING_KEY }}
          FIREFOX_JWT_SECRET: ${{ secrets.AMO_SIGNING_SECRET }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_CLIENT_SECRET }} 
          EDGE_TENANT_ID: ${{ secrets.EDGE_ACCESS_TOKEN_URL }}
          # 如果是 Node 18+
          NODE_OPTIONS: "--no-warnings"

      # 只有当上述 publish 成功执行后，才创建 GitHub Release 并挂载 ZIP
      - name: Create GitHub Release
        # 修改判断条件：只要上一步成功运行了即可
        if: steps.changesets.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .output/*firefox*.zip
            .output/*edge*.zip
            .output/*sources*.zip
          # 使用前面步骤提取的可靠版本号
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}