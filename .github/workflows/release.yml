name: Release
on:
  push:
    branches:
      - main
    paths:
      - "package.json"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get version from package.json
        id: get_version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Publish to Stores
        id: changesets
        uses: changesets/action@v1
        with:
          # 它会自动检查版本。如果本地 package.json 版本没变，它什么都不会执行。
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIREFOX_EXTENSION_ID: ${{ secrets.AMO_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.AMO_SIGNING_KEY }}
          FIREFOX_JWT_SECRET: ${{ secrets.AMO_SIGNING_SECRET }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_CLIENT_SECRET }} 
          EDGE_TENANT_ID: ${{ secrets.EDGE_ACCESS_TOKEN_URL }}

      - name: Create GitHub Release
        if: steps.changesets.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .output/*firefox*.zip
            .output/*edge*.zip
            .output/*sources*.zip
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}