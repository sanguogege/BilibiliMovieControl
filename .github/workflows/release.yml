name: Release
on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # 执行自定义的发布脚本
          publish: bun run release
          version: bun run version
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Firefox 凭证
          FIREFOX_EXTENSION_ID: ${{ secrets.AMO_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.AMO_SIGNING_KEY }}
          FIREFOX_JWT_SECRET: ${{ secrets.AMO_SIGNING_SECRET }}
          # Edge 凭证
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_CLIENT_SECRET: ${{ secrets.EDGE_CLIENT_SECRET }}
          EDGE_ACCESS_TOKEN_URL: ${{ secrets.EDGE_ACCESS_TOKEN_URL }}
          # 补充环境变量名，确保发布脚本能正确获取到 Edge 的凭证
          EDGE_API_KEY: ${{ secrets.EDGE_CLIENT_SECRET }} 
          EDGE_TENANT_ID: ${{ secrets.EDGE_ACCESS_TOKEN_URL }}


      - name: Upload to GitHub Release
        # 只有当 Changesets 真的执行了 publish（即版本更新了）才运行
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@v1
        with:
          # 指定要挂载到 GitHub Release 页面供人下载的文件
          files: |
            .output/*firefox*.zip
            .output/*edge*.zip
          # 使用 Changesets 自动生成的 Tag 名字
          tag_name: v${{ steps.changesets.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}